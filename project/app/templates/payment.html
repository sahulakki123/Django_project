<!DOCTYPE html>
<html>

<head>
    <title>Order Now</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

    <style>
        @import url('https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap');

        body {
            font-family: 'Poppins', sans-serif;
            background: linear-gradient(135deg, #fdfbfb 0%, #ebedee 100%);
            min-height: 100vh;
            color: #333;
        }

        /* Container & Card */
        .container {
            max-width: 900px;
        }

        .card {
            border: none;
            border-radius: 20px;
            background: #ffffff;
            box-shadow: 0 15px 35px rgba(0, 0, 0, 0.05);
            padding: 40px !important;
            margin-bottom: 50px;
            transition: all 0.3s ease;
        }

        .card:hover {
            box-shadow: 0 20px 45px rgba(0, 0, 0, 0.08);
            transform: translateY(-2px);
        }

        /* Image */
        .card img {
            border-radius: 16px;
            height: 280px;
            width: 100%;
            object-fit: cover;
            box-shadow: 0 10px 20px rgba(0, 0, 0, 0.08);
            transition: transform 0.3s ease;
        }

        .card img:hover {
            transform: scale(1.02);
        }

        /* Content Layout */
        .col-md-4 {
            display: flex;
            flex-direction: column;
            gap: 15px;
        }

        .col-md-8 {
            display: flex;
            flex-direction: column;
            justify-content: center;
            padding-left: 40px !important;
        }

        /* Typography */
        h3 {
            font-weight: 700;
            color: #2d3436;
            font-size: 32px;
            margin-bottom: 15px;
            letter-spacing: -0.5px;
        }

        h6.text-muted {
            font-size: 16px;
            font-weight: 500;
            color: #718096 !important;
            margin-bottom: 20px;
            background: #f8f9fa;
            padding: 8px 15px;
            border-radius: 8px;
            display: inline-block;
            width: fit-content;
        }

        p {
            font-size: 15px;
            line-height: 1.7;
            color: #4a5568;
            margin-bottom: 25px;
        }

        /* Price */
        .text-success {
            color: #ff6b00 !important;
            font-weight: 700;
            font-size: 28px;
            margin-bottom: 25px;
        }

        /* Form Controls (Quantity) */
        .form-label {
            font-weight: 600;
            color: #4a5568;
            margin-bottom: 8px;
            font-size: 14px;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        input[type="number"] {
            border-radius: 10px;
            height: 50px;
            border: 2px solid #e2e8f0;
            font-weight: 600;
            font-size: 16px;
            color: #2d3436;
            padding-left: 15px;
            transition: all 0.3s ease;
            box-shadow: none !important;
            max-width: 150px;
        }

        input[type="number"]:focus {
            border-color: #ff6b00;
            outline: none;
            box-shadow: 0 0 0 4px rgba(255, 107, 0, 0.1) !important;
        }

        /* Buttons */
        button.btn-success {
            background: linear-gradient(135deg, #ff6b00 0%, #e65c00 100%);
            border: none;
            width: 100%;
            height: 50px;
            font-weight: 600;
            font-size: 16px;
            letter-spacing: 0.5px;
            border-radius: 12px;
            margin-top: 10px;
            box-shadow: 0 8px 20px rgba(255, 107, 0, 0.3);
            transition: all 0.3s ease;
        }

        button.btn-success:hover {
            transform: translateY(-2px);
            box-shadow: 0 12px 25px rgba(255, 107, 0, 0.4);
            background: linear-gradient(135deg, #ff7b1a 0%, #f06a11 100%);
        }

        /* Razorpay Button overrides */
        form+form {
            margin-top: 15px;
        }

        .razorpay-payment-button {
            width: 100% !important;
            height: 50px !important;
            border-radius: 12px !important;
            background: linear-gradient(135deg, #0d6efd 0%, #0056b3 100%) !important;
            color: white !important;
            border: none !important;
            font-weight: 600 !important;
            font-size: 16px !important;
            letter-spacing: 0.5px;
            box-shadow: 0 8px 20px rgba(13, 110, 253, 0.3) !important;
            transition: all 0.3s ease !important;
        }

        .razorpay-payment-button:hover {
            transform: translateY(-2px) !important;
            box-shadow: 0 12px 25px rgba(13, 110, 253, 0.4) !important;
        }

        /* Mobile */
        @media(max-width:768px) {
            .card {
                padding: 25px !important;
            }

            .col-md-8 {
                padding-left: 15px !important;
                margin-top: 25px;
            }

            .card img {
                height: 220px;
            }

            h3 {
                font-size: 26px;
            }

            .text-success {
                font-size: 24px;
            }

            input[type="number"] {
                max-width: 100%;
            }
        }
    </style>
</head>

<body>

    <div class="container mt-5">

        <div class="card shadow p-4">

            <form method="POST" action="{% url 'payment_amount' item_details.id %}">
                {% csrf_token %}

                <div class="row">
                    <div class="col-md-4">

                        <img src="{{ item_details.itemimage.url }}" class="img-fluid rounded">

                        <button class="btn btn-success">Pay Now</button>

                    </div>

                    <div class="col-md-8">

                        <h3>{{ item_details.itemname }}</h3>

                        <h6 class="text-muted">
                            🍽 {{ item_details.restaurant.restaurantname }}
                        </h6>

                        <p>
                            {{ item_details.itemdesc }}
                        </p>

                        <h5 class="text-success">
                            ₹ {{ item_details.itemprice }}
                        </h5>

                        <div class="mb-3">
                            <label class="form-label">Quantity</label>
                            <input type="number" name="quantity" value="1" class="form-control" min="1" required>
                        </div>

                        <input type="hidden" name="item_id" value="{{ item_details.id }}">
                        <input type="hidden" name="itemprice" value="{{ item_details.itemprice }}">

                    </div>
                </div>

            </form>

            {% if payment %}

            <form action="{% url 'pay_status' item_details.id %}" method="post">
                {% csrf_token %}

                <script src="https://checkout.razorpay.com/v1/checkout.js"
                    data-key="rzp_test_pr99iascS1WRtU"
                    data-amount="{{ payment.amount }}"
                    data-currency="{{ payment.currency }}"
                    data-order_id="{{ payment.id }}"
                    data-buttontext="Pay with Razorpay"
                    data-name="Food Order"
                    data-description="Payment for your order"
                    data-prefill.contact="9999999999"
                    data-prefill.email="test@razorpay.com"
                    data-theme.color="#ff6b00">
                </script>

            </form>

            {% endif %}

        </div>

    </div>

</body>

</html>
