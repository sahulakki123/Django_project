{% load static %}
<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <!-- Bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

    <title>Reset Password</title>

    <style>
        body {
            background: linear-gradient(135deg, #ff512f, #dd2476);
            height: 100vh;
        }

        .card {
            border: none;
            border-radius: 20px;
        }

        .form-control {
            border-radius: 12px;
            padding: 12px;
        }

        .btn-food {
            background: #ff6b00;
            color: white;
            border-radius: 12px;
            font-weight: 600;
        }

        .btn-food:hover {
            background: #e65c00;
            color: white;
        }

        .logo {
            font-size: 26px;
            font-weight: bold;
            color: #ff6b00;
        }
    </style>

</head>

<body>

    <div class="container d-flex justify-content-center align-items-center vh-100">

        <div class="card shadow-lg p-4" style="width:420px;">

            <div class="text-center mb-2">
                <div class="logo">🍔 FoodHub</div>
            </div>

            <h4 class="text-center mb-3">Reset Password</h4>
            <p class="text-center text-muted">Enter OTP and new password</p>

            <form action="{% url 'reset' %}" method="post">
                {% csrf_token %}

                {% if msg %}
                <div class="alert alert-danger py-2">
                    {{msg}}
                </div>
                {% endif %}

                {% if msg1 %}
                <div class="alert alert-warning py-2">
                    {{msg1}}
                </div>
                {% endif %}

                <div class="mb-3">
                    <label class="form-label">OTP</label>
                    <input type="number" name="otp" class="form-control" placeholder="Enter OTP" required>
                </div>

                <div class="mb-3">
                    <label class="form-label">New Password</label>
                    <input type="password" name="password" class="form-control" placeholder="New password" required>
                </div>

                <div class="mb-3">
                    <label class="form-label">Confirm Password</label>
                    <input type="password" name="cpassword" class="form-control" placeholder="Confirm password"
                        required>
                </div>

                <button type="submit" class="btn btn-food w-100">
                    Reset Password
                </button>

                <div class="text-center mt-3">
                    <a href="{% url 'login' %}" class="text-decoration-none">
                        ← Back to Login
                    </a>
                </div>

            </form>

        </div>

    </div>

</body>

</html>
