{% load static %}
<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <!-- Bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

    <title>Login</title>

    <style>
        body {
            background: linear-gradient(135deg, #ff512f, #dd2476);
            height: 100vh;
        }

        .login-card {
            border: none;
            border-radius: 20px;
        }

        .form-control {
            border-radius: 12px;
            padding: 12px;
        }

        .btn-food {
            background: #ff6b00;
            color: white;
            border-radius: 12px;
            padding: 10px;
            font-weight: 600;
        }

        .btn-food:hover {
            background: #e65c00;
            color: white;
        }

        .food-title {
            color: #ff6b00;
            font-weight: 700;
        }

        .logo {
            font-size: 28px;
            font-weight: bold;
            color: #ff6b00;
        }
    </style>
</head>

<body>

    <div class="container d-flex justify-content-center align-items-center vh-100">

        <div class="card shadow-lg p-4 login-card" style="max-width:400px; width:100%;">

            <div class="text-center mb-2">
                <div class="logo">🍔 Login</div>
                <div class="text-center mt-2">
                    <a href="{% url 'signup' %}" class="text-decoration-none">
                        Create account
                    </a>
                </div>
            </div>



            {% if msg %}
            <div class="alert alert-danger py-2 text-center">
                {{msg}}
            </div>
            {% endif %}

            <form action="{% url 'login' %}" method="post">
                {% csrf_token %}

                <div class="mb-3">
                    <input type="email" name="email" class="form-control" placeholder="Enter email" required>
                </div>

                <div class="mb-3">
                    <input type="password" name="password" class="form-control" placeholder="Enter password" required>
                </div>

                <div class="d-grid">
                    <button type="submit" class="btn btn-food">
                        Login
                    </button>
                </div>

            </form>

            <div class="text-center mt-3">
                <a href="{% url 'forget_password' %}" class="text-decoration-none">
                    Forgot Password?
                </a>
            </div>



        </div>

    </div>

</body>

</html>
