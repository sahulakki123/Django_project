{% load static %}
<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <!-- Bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

    <title>Sign Up</title>

    <style>
        @import url('https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap');

        body {
            font-family: 'Poppins', sans-serif;
            margin: 0;
            padding: 0;
            background: linear-gradient(135deg, #1a1a2e, #16213e, #0f3460);
            background-size: 400% 400%;
            animation: gradientBG 15s ease infinite;
            height: 100vh;
            color: #ffffff;
            position: relative;
            overflow: hidden;
        }

        /* Animated Blobs using Pseudo-elements */
        body::before, body::after {
            content: '';
            position: absolute;
            border-radius: 50%;
            filter: blur(80px);
            z-index: 0;
            opacity: 0.6;
            pointer-events: none;
        }

        body::before {
            width: 300px;
            height: 300px;
            background: #e94560;
            top: -100px;
            left: -100px;
            animation: float 8s ease-in-out infinite;
        }

        body::after {
            width: 400px;
            height: 400px;
            background: #ff6b00;
            bottom: -150px;
            right: -100px;
            animation: float 10s ease-in-out infinite reverse;
        }

        @keyframes gradientBG {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }

        @keyframes float {
            0% { transform: translateY(0px) scale(1); }
            50% { transform: translateY(-30px) scale(1.05); }
            100% { transform: translateY(0px) scale(1); }
        }

        /* Ensure content is above background elements */
        .container {
            position: relative;
            z-index: 10;
        }

        .signup-card {
            background: rgba(255, 255, 255, 0.05) !important;
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.1) !important;
            border-radius: 24px !important;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5) !important;
            color: #ffffff;
            padding: 40px 30px !important;
            transition: transform 0.3s ease, box-shadow 0.3s ease;
        }

        .signup-card:hover {
            transform: translateY(-5px);
            box-shadow: 0 30px 60px -12px rgba(0, 0, 0, 0.6) !important;
        }

        .signup-card h4 {
            font-weight: 600;
            color: #ffffff;
            margin-bottom: 25px !important;
        }

        .signup-card a.text-decoration-none {
            color: #ff6b00;
            font-weight: 500;
            transition: color 0.3s ease;
        }
        
        .signup-card a.text-decoration-none:hover {
            color: #ffffff;
            text-decoration: underline !important;
        }

        .signup-card p.text-center {
            color: #b3b3b3;
        }

        .form-control {
            background: rgba(0, 0, 0, 0.2) !important;
            border: 1px solid rgba(255, 255, 255, 0.1) !important;
            border-radius: 12px !important;
            color: white !important;
            padding: 14px 16px !important;
            font-size: 15px;
            transition: all 0.3s ease;
        }

        .form-control::placeholder {
            color: #b3b3b3 !important;
        }

        .form-control:focus {
            background: rgba(0, 0, 0, 0.3) !important;
            border-color: #ff6b00 !important;
            box-shadow: 0 0 0 4px rgba(255, 107, 0, 0.1) !important;
        }

        .btn-food {
            background: linear-gradient(to right, #ff6b00, #ff8a3d) !important;
            color: white !important;
            border: none;
            border-radius: 12px !important;
            padding: 14px !important;
            font-size: 16px;
            font-weight: 600;
            box-shadow: 0 10px 20px rgba(255, 107, 0, 0.3);
            transition: all 0.3s ease;
        }

        .btn-food:hover {
            background: linear-gradient(to right, #ff7a1a, #ff9b57) !important;
            transform: translateY(-2px);
            box-shadow: 0 15px 25px rgba(255, 107, 0, 0.4);
        }

        .btn-food:active {
            transform: translateY(1px);
        }

        .logo {
            font-size: 32px;
            font-weight: 700;
            color: #ff6b00;
            letter-spacing: -1px;
            margin-bottom: 20px;
            display: inline-block;
        }
        
        .logo:hover {
            text-shadow: 0 0 15px rgba(255,107,0,0.5);
            transition: text-shadow 0.3s ease;
        }

        .text-danger {
            color: #ff4d4d !important;
            padding-left: 5px;
            display: inline-block;
            margin-top: 5px;
        }

        /* Autofill styling */
        input:-webkit-autofill,
        input:-webkit-autofill:hover, 
        input:-webkit-autofill:focus, 
        input:-webkit-autofill:active {
            -webkit-box-shadow: 0 0 0 30px #1a1e29 inset !important;
            -webkit-text-fill-color: white !important;
            transition: background-color 5000s ease-in-out 0s;
        }
    </style>

</head>

<body>

    <div class="container d-flex justify-content-center align-items-center vh-100">

        <div class="card shadow-lg p-4 signup-card" style="max-width: 420px; width:100%;">

            <div class="text-center mb-2">
                <div class="logo">🍔 FoodHub</div>
            </div>

            <h4 class="text-center mb-3">Create Account</h4>

            <p class="text-center">
                <a href="{% url 'login' %}" class="text-decoration-none">
                    Already have account? Login
                </a>
            </p>

            <form action="{% url 'signup' %}" method="post">
                {% csrf_token %}

                <!-- NAME -->
                <div class="mb-3">
                    <input type="text" name="name" class="form-control" placeholder="Full Name" required>
                </div>

                <!-- PHONE -->
                <div class="mb-3">
                    <input type="number" name="contact" class="form-control" placeholder="Phone Number" required>
                    <small class="text-danger">{{msg}}</small>
                </div>

                <!-- EMAIL -->
                <div class="mb-3">
                    <input type="email" name="email" class="form-control" placeholder="Email Address" required>
                </div>

                <!-- PASSWORD -->
                <div class="mb-3">
                    <input type="password" name="password" class="form-control" placeholder="Password" required>
                </div>

                <!-- CONFIRM PASSWORD -->
                <div class="mb-3">
                    <input type="password" name="cpassword" class="form-control" placeholder="Confirm Password"
                        required>
                </div>

                <!-- BUTTON -->
                <div class="d-grid">
                    <button type="submit" class="btn btn-food">
                        Sign Up
                    </button>
                </div>

            </form>

        </div>

    </div>

</body>

</html>
