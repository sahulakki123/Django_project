{% load static %}
<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <!-- Bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

    <title>Sign Up</title>

    <style>
        body {
            background: linear-gradient(135deg, #ff512f, #dd2476);
            height: 100vh;
        }

        .signup-card {
            border: none;
            border-radius: 20px;
        }

        .form-control {
            border-radius: 12px;
            padding: 12px;
        }

        .btn-food {
            background: #ff6b00;
            color: white;
            border-radius: 12px;
            font-weight: 600;
        }

        .btn-food:hover {
            background: #e65c00;
            color: white;
        }

        .logo {
            font-size: 26px;
            font-weight: bold;
            color: #ff6b00;
        }
    </style>

</head>

<body>

    <div class="container d-flex justify-content-center align-items-center vh-100">

        <div class="card shadow-lg p-4 signup-card" style="max-width: 420px; width:100%;">

            <div class="text-center mb-2">
                <div class="logo">🍔 FoodHub</div>
            </div>

            <h4 class="text-center mb-3">Create Account</h4>

            <p class="text-center">
                <a href="{% url 'login' %}" class="text-decoration-none">
                    Already have account? Login
                </a>
            </p>

            <form action="{% url 'signup' %}" method="post">
                {% csrf_token %}

                <!-- NAME -->
                <div class="mb-3">
                    <input type="text" name="name" class="form-control" placeholder="Full Name" required>
                </div>

                <!-- PHONE -->
                <div class="mb-3">
                    <input type="number" name="contact" class="form-control" placeholder="Phone Number" required>
                    <small class="text-danger">{{msg}}</small>
                </div>

                <!-- EMAIL -->
                <div class="mb-3">
                    <input type="email" name="email" class="form-control" placeholder="Email Address" required>
                </div>

                <!-- PASSWORD -->
                <div class="mb-3">
                    <input type="password" name="password" class="form-control" placeholder="Password" required>
                </div>

                <!-- CONFIRM PASSWORD -->
                <div class="mb-3">
                    <input type="password" name="cpassword" class="form-control" placeholder="Confirm Password"
                        required>
                </div>

                <!-- BUTTON -->
                <div class="d-grid">
                    <button type="submit" class="btn btn-food">
                        Sign Up
                    </button>
                </div>

            </form>

        </div>

    </div>

</body>

</html>
