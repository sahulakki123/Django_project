<!DOCTYPE html>
<html>

<head>
    <title>Payment Successful</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

    <style>
        body{
            background:#f8f9fa;
            height:100vh;
            display:flex;
            justify-content:center;
            align-items:center;
        }

        .success-card{
            background:white;
            padding:40px;
            border-radius:15px;
            text-align:center;
            box-shadow:0 5px 20px rgba(0,0,0,0.1);
            width:350px;
        }

        .check-icon{
            font-size:60px;
            color:#28a745;
        }

        .done-btn{
            background:#ff6b00;
            border:none;
            padding:10px 30px;
            color:white;
            border-radius:8px;
            margin-top:20px;
            font-weight:600;
        }

        .done-btn:hover{
            background:#e65c00;
        }
    </style>
</head>

<body>

    <div class="success-card">
        <div class="check-icon">✔</div>

        <h3 class="mt-3">Payment Successful</h3>

        <p class="text-muted">
            Your order has been placed successfully 🎉
        </p>

        <a href="{% url 'userdashboard' %}" class="btn done-btn">
            Done
        </a>
    </div>

</body>

</html>
