<!DOCTYPE html>
<html>

<head>
    <title>Cart</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body>

    <div class="container mt-5">

        <h3>🛒 Your Cart</h3>
        <hr>

        <table class="table table-bordered">
            <thead class="table-dark">
                <tr>
                    <th>Item</th>
                    <th>Price</th>
                    <th>Qty</th>
                    <th>Total</th>
                    <th>Action</th>
                </tr>
            </thead>

            <tbody>

                {% for i in cart %}
                <tr>
                    <td>{{ i.item.itemname }}</td>
                    <td>₹ {{ i.item.itemprice }}</td>
                    <td>{{ i.quantity }}</td>
                    <td>₹ {{ i.item.itemprice|floatformat:2 }}</td>
                    <td>
                        <a href="{% url 'remove_cart' i.id %}" class="btn btn-danger btn-sm">
                            Remove
                        </a>

                        <a href="{% url 'paynow' i.item.id %}" class="btn btn-success btn-sm">
                            Order Now
                        </a>
                    </td>
                </tr>
                {% endfor %}

            </tbody>
        </table>

        <hr>

        <h4>Total Amount : ₹ {{ total }}</h4>

        <div class="mt-3">
            <a href="{% url 'userdashboard' %}" class="btn btn-secondary">
                Continue Shopping
            </a>

            <a href="" class="btn btn-success">
                Proceed to Payment
            </a>
        </div>

    </div>

</body>

</html>
